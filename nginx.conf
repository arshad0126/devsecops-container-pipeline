# Secure Non-Root Nginx Configuration

pid /tmp/nginx.pid; # Required for non-root runtime (cannot write to /var/run/)

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging settings
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # Security settings
    server_tokens off; # Disables server version leak (security requirement)
    
    # Anti-clickjacking & XSS protections
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https:;" always;

    server {
        listen 8080 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Support client-side routing in React
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache control for static assets (optional, good practice)
        location /static/ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }
    }
}
